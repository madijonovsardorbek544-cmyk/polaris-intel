<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Request POLARIS Pilot</title><style>
:root{color-scheme:dark;--panel:rgba(255,255,255,.075);--line:rgba(255,255,255,.14);--text:rgba(255,255,255,.94);--muted:rgba(255,255,255,.68);--accent:#8ab4ff;--ok:#7ae582;--err:#ff5f6d}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#050913,#0a1424 58%,#050913)}a{color:var(--accent);text-decoration:none}.shell{width:min(900px,calc(100% - 32px));margin:0 auto;padding:28px 0 64px}nav{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:36px}.button,button{border:1px solid var(--line);border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.06);color:var(--text);font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,#8ab4ff,#7ae582);color:#06101f;border:0}.panel{border:1px solid var(--line);background:var(--panel);border-radius:24px;padding:24px;box-shadow:0 18px 54px rgba(0,0,0,.2)}h1{font-size:clamp(36px,7vw,72px);line-height:.95;letter-spacing:-.05em;margin:0 0 12px}p,.muted{color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:grid;gap:6px;color:var(--muted);font-size:13px}input,select,textarea{border:1px solid var(--line);border-radius:14px;padding:12px 13px;color:var(--text);background:rgba(255,255,255,.055);outline:none;width:100%;font:inherit}textarea{min-height:130px;resize:vertical}.full{grid-column:1/-1}.hp{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden}.notice{margin-top:14px}.ok{color:var(--ok)}.err{color:var(--err)}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style></head><body><main class="shell"><nav><a href="/">POLARIS INTEL</a><div><a class="button" href="/demo">Live Demo</a> <a class="button" href="/dashboard">Operator Dashboard</a></div></nav><section class="panel"><h1>Request a POLARIS pilot</h1><p>We are looking for 3–5 pilot organizations to test POLARIS with real watchlists and daily risk briefings. No emails are sent automatically; this form records your request for follow-up.</p><form id="leadForm" class="grid"><label>Name *<input name="name" required /></label><label>Email *<input name="email" type="email" required /></label><label>Organization<input name="organization" /></label><label>Role<input name="role" /></label><label>Country<input name="country" /></label><label>Organization type *<select name="organization_type" required><option value="">Select type</option><option>school</option><option>NGO</option><option>logistics</option><option>banking/finance</option><option>energy</option><option>telecom/government-adjacent</option><option>other under-resourced team</option></select></label><label class="full">Problem description *<textarea name="problem_description" required placeholder="What risks do you need to monitor, and what is hard today?"></textarea></label><label class="full">Preferred contact method<input name="preferred_contact_method" placeholder="Email, Telegram, LinkedIn, phone, etc." /></label><label class="hp" aria-hidden="true" tabindex="-1">Website<input name="website" autocomplete="off" tabindex="-1" /></label><div class="full"><button class="primary" type="submit">Request a pilot</button><div id="notice" class="notice"></div></div></form></section></main><script>
const form=document.getElementById('leadForm'), notice=document.getElementById('notice');
form.addEventListener('submit', async (event)=>{event.preventDefault();notice.textContent='Submitting…';notice.className='notice';const payload=Object.fromEntries(new FormData(form).entries());try{const res=await fetch('/api/leads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok) throw new Error(data.detail||'Submission failed. Please check required fields.');notice.textContent='Pilot request received. POLARIS will not send automated email from this form yet.';notice.className='notice ok';form.reset();}catch(err){notice.textContent=err.message||'Submission failed.';notice.className='notice err';}});
</script></body></html>
