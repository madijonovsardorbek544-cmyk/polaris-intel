<!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <title>POLARIS Intel</title> <style> :root{color-scheme:dark} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1220;color:#e8eefc} .wrap{max-width:900px;margin:0 auto;padding:48px 18px} h1{margin:0 0 10px;font-size:42px;letter-spacing:.5px} .status{opacity:.8;margin-bottom:22px} .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:14px 0 18px} button{ background:#1f2a44;border:1px solid #2d3a5d;color:#e8eefc; padding:10px 14px;border-radius:10px;cursor:pointer } button:hover{filter:brightness(1.08)} input{ background:#0f1930;border:1px solid #2d3a5d;color:#e8eefc; padding:10px 12px;border-radius:10px;min-width:240px } .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px} .card{ background:#0f1930;border:1px solid #2d3a5d;border-radius:14px; padding:14px 14px 12px } .card h3{margin:0 0 8px;font-size:18px} .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.85;margin-top:10px} .pill{padding:3px 8px;border-radius:999px;border:1px solid #2d3a5d;background:#101b33} a{color:#89b4ff} .small{font-size:12px;opacity:.75;margin-top:18px} .err{color:#ff8f8f} </style> </head> <body> <div class="wrap"> <h1>POLARIS Intel</h1> <div id="status" class="status">Status: loading...</div> <div class="row"> <button id="btnReload" type="button">Reload</button> <input id="search" type="text" placeholder="Search title / summary / tags..." /> </div> <div id="cards" class="grid"></div> <div class="small"> Tip: API endpoint → <a href="/api/latest" target="_blank" rel="noreferrer">/api/latest</a> </div> </div> <script> const statusEl = document.getElementById("status"); const cardsEl = document.getElementById("cards"); const searchEl = document.getElementById("search"); const btnReload = document.getElementById("btnReload"); let allItems = []; function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); } function render(items){ cardsEl.innerHTML = ""; if(!items || items.length === 0){ cardsEl.innerHTML = `<div class="card"><h3>No items</h3><div class="meta"><span class="pill">empty</span></div></div>`; return; } for(const it of items){ const title = escapeHtml(it.title); const summary = escapeHtml(it.summary); const riskLevel = escapeHtml(it.risk_level); const category = escapeHtml(it.category); const riskScore = escapeHtml(it.risk_score); const source = escapeHtml(it.source); const tags = Array.isArray(it.tags) ? it.tags.map(escapeHtml) : []; const div = document.createElement("div"); div.className = "card"; div.innerHTML = ` <h3>${title}</h3> <div>${summary}</div> <div class="meta"> <span class="pill">Risk: ${riskLevel} (${riskScore})</span> <span class="pill">${category}</span> ${tags.slice(0,4).map(t => `<span class="pill">#${t}</span>`).join("")} </div> ${source ? `<div class="small">Source: <a href="${source}" target="_blank" rel="noreferrer">${source}</a></div>` : ""} `; cardsEl.appendChild(div); } } function applySearch(){ const q = (searchEl.value || "").trim().toLowerCase(); if(!q){ render(allItems); return; } const filtered = allItems.filter(it => { const t = (it.title || "").toLowerCase(); const s = (it.summary || "").toLowerCase(); const tags = Array.isArray(it.tags) ? it.tags.join(" ").toLowerCase() : ""; return t.includes(q) || s.includes(q) || tags.includes(q); }); render(filtered); } async function loadLatest(){ statusEl.textContent = "Status: fetching..."; statusEl.classList.remove("err"); try{ const res = await fetch("/api/latest", { cache: "no-store" }); if(!res.ok) throw new Error("HTTP " + res.status); const data = await res.json(); if(!Array.isArray(data)) throw new Error("API did not return an array"); allItems = data; applySearch(); statusEl.textContent = `Status: OK (${data.length} items)`; } catch (e){ console.error(e); statusEl.textContent = "Status: ERROR (open console)"; statusEl.classList.add("err"); cardsEl.innerHTML = `<div class="card"><h3 class="err">Failed to load</h3><div>${escapeHtml(e.message)}</div></div>`; } } btnReload.addEventListener("click", loadLatest); searchEl.addEventListener("input", applySearch); loadLatest(); </script> </body> </html>
