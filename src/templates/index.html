<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>POLARIS Intel</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0b1220;
        color: #e8eefc;
      }
      .wrap { max-width: 980px; margin: 0 auto; padding: 48px 18px; }
      h1 { margin: 0 0 10px; font-size: 42px; letter-spacing: .5px; }
      .status { opacity: .8; margin-bottom: 22px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 14px 0 18px; }
      button {
        background: #1f2a44; border: 1px solid #2d3a5d; color: #e8eefc;
        padding: 10px 14px; border-radius: 10px; cursor: pointer;
      }
      button:hover { filter: brightness(1.08); }
      input {
        background: #0f1930; border: 1px solid #2d3a5d; color: #e8eefc;
        padding: 10px 12px; border-radius: 10px; min-width: 240px;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
      .card {
        background: #0f1930; border: 1px solid #2d3a5d; border-radius: 14px;
        padding: 14px 14px 12px;
      }
      .card h3 { margin: 0 0 8px; font-size: 18px; line-height: 1.25; }
      .summary {
        font-size: 14px;
        line-height: 1.45;
        opacity: 0.95;
        white-space: pre-wrap;      /* newlines tartibli ko‘rinadi */
        overflow-wrap: anywhere;    /* uzun so‘z/URL bo‘lsa ham joyni buzmaydi */
        word-break: break-word;
      }
      .meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; opacity: .85; margin-top: 10px; }
      .pill { padding: 3px 8px; border-radius: 999px; border: 1px solid #2d3a5d; background: #101b33; }
      a { color: #89b4ff; overflow-wrap: anywhere; word-break: break-word; }
      .small { font-size: 12px; opacity: .75; margin-top: 10px; }
      .footer { font-size: 12px; opacity: .75; margin-top: 18px; }
      .err { color: #ff8f8f; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>POLARIS Intel</h1>
      <div id="status" class="status">Status: loading...</div>

      <div class="row">
        <button id="btnReload" type="button">Reload</button>
        <input id="search" type="text" placeholder="Search title / summary / tags..." />
      </div>

      <div id="cards" class="grid"></div>

      <div class="footer">
        Tip: API endpoint → <a href="/api/latest" target="_blank" rel="noreferrer">/api/latest</a>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const cardsEl = document.getElementById("cards");
      const searchEl = document.getElementById("search");
      const btnReload = document.getElementById("btnReload");

      let allItems = [];

      function toText(v) {
        return String(v ?? "");
      }

      function clampText(s, max = 360) {
        s = toText(s).trim();
        if (s.length <= max) return s;
        return s.slice(0, max).trimEnd() + "…";
      }

      function safeUrl(url) {
        url = toText(url).trim();
        if (!url) return "";
        // faqat http/https bo‘lsa link qilamiz
        if (!/^https?:\/\//i.test(url)) return "";
        return url;
      }

      function makeEl(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined) el.textContent = text;
        return el;
      }

      function render(items) {
        cardsEl.replaceChildren();

        if (!items || items.length === 0) {
          const card = makeEl("div", "card");
          card.appendChild(makeEl("h3", "", "No items"));
          const meta = makeEl("div", "meta");
          meta.appendChild(makeEl("span", "pill", "empty"));
          card.appendChild(meta);
          cardsEl.appendChild(card);
          return;
        }

        for (const it of items) {
          const title = clampText(it.title, 120);
          const summary = clampText(it.summary, 420);
          const riskLevel = toText(it.risk_level);
          const category = toText(it.category);
          const riskScore = toText(it.risk_score);
          const source = safeUrl(it.source);
          const tags = Array.isArray(it.tags) ? it.tags.map(t => toText(t)).filter(Boolean) : [];

          const card = makeEl("div", "card");

          const h3 = makeEl("h3", "", title || "Untitled");
          card.appendChild(h3);

          const sum = makeEl("div", "summary", summary || "");
          card.appendChild(sum);

          const meta = makeEl("div", "meta");
          meta.appendChild(makeEl("span", "pill", `Risk: ${riskLevel || "Unknown"} (${riskScore || "?"})`));
          if (category) meta.appendChild(makeEl("span", "pill", category));

          for (const t of tags.slice(0, 6)) {
            meta.appendChild(makeEl("span", "pill", `#${t}`));
          }
          card.appendChild(meta);

          if (source) {
            const small = makeEl("div", "small");
            small.appendChild(document.createTextNode("Source: "));
            const a = document.createElement("a");
            a.href = source;
            a.target = "_blank";
            a.rel = "noreferrer";
            a.textContent = source;
            small.appendChild(a);
            card.appendChild(small);
          }

          cardsEl.appendChild(card);
        }
      }

      function applySearch() {
        const q = (searchEl.value || "").trim().toLowerCase();
        if (!q) { render(allItems); return; }

        const filtered = allItems.filter(it => {
          const t = toText(it.title).toLowerCase();
          const s = toText(it.summary).toLowerCase();
          const tags = Array.isArray(it.tags) ? it.tags.join(" ").toLowerCase() : "";
          return t.includes(q) || s.includes(q) || tags.includes(q);
        });

        render(filtered);
      }

      async function loadLatest() {
        statusEl.textContent = "Status: fetching...";
        statusEl.classList.remove("err");

        try {
          const res = await fetch("/api/latest", { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);

          const data = await res.json();
          if (!Array.isArray(data)) throw new Error("API did not return an array");

          allItems = data;
          applySearch();
          statusEl.textContent = `Status: OK (${data.length} items)`;
        } catch (e) {
          console.error(e);
          statusEl.textContent = "Status: ERROR";
          statusEl.classList.add("err");

          cardsEl.replaceChildren();
          const card = makeEl("div", "card");
          const h3 = makeEl("h3", "err", "Failed to load");
          card.appendChild(h3);
          card.appendChild(makeEl("div", "summary", toText(e.message)));
          cardsEl.appendChild(card);
        }
      }

      btnReload.addEventListener("click", loadLatest);
      searchEl.addEventListener("input", applySearch);
      loadLatest();
    </script>
  </body>
</html>
